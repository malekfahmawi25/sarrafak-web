services:
  - type: web
    name: sarrafak-web
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm run migrate && npm start
    initialDeployHook: npm run import:clients
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "24.12.0"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: sarrafak-db
          property: connectionString
      - key: APP_SECRET
        generateValue: true
      - key: PIN_PEPPER
        generateValue: true
      - key: ALLOW_SELF_DEPOSIT
        value: "false"
      - key: TRUST_PROXY
        value: "true"
      - key: ALLOWED_ORIGINS
        value: https://malekfahmawi25.github.io,http://localhost:5500,http://127.0.0.1:5500
      - key: SESSION_TTL_HOURS
        value: "12"
      - key: SESSION_IDLE_MINUTES
        value: "30"

databases:
  - name: sarrafak-db
    databaseName: sarrafak
    user: sarrafak
    plan: free
    ipAllowList: []
